# 资产管理系统 - Docker Compose 配置
# 环境变量从 .env 文件读取
# 一键启动：npm run docker:deploy
# 停止服务：npm run docker:down
# 查看日志：npm run docker:logs

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: zichuan-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: asset-manage
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_HOST_PORT:-3308}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Next.js 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zichuan-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: ${NODE_ENV}
    depends_on:
      mysql:
        condition: service_healthy

  # 数据库初始化（运行迁移和种子数据）
  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zichuan-db-init
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "sleep 10 && npx prisma migrate deploy && npx tsx prisma/seed.ts"
    restart: "no"

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: zichuan-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HOST_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  mysql_data:
